<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Граф знаний — чат</title>
<style>
  :root {
    --bg: #f5f4f0; --panel: #ffffff; --border: #e2e0d8;
    --text: #23211c; --muted: #7a766b; --accent: #1f6f5c;
    --user-bubble: #1f6f5c; --bot-bubble: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 15px/1.55 "Segoe UI", system-ui, sans-serif;
    height: 100vh; display: flex; flex-direction: column;
  }
  header {
    padding: 14px 22px; background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: baseline; gap: 12px;
  }
  header h1 { font-size: 17px; font-weight: 600; }
  header span { color: var(--muted); font-size: 13px; }
  #chat {
    flex: 1; overflow-y: auto; padding: 22px;
    display: flex; flex-direction: column; gap: 14px;
    max-width: 900px; width: 100%; margin: 0 auto;
  }
  .msg { max-width: 85%; padding: 11px 15px; border-radius: 12px; white-space: pre-wrap; }
  .user { align-self: flex-end; background: var(--user-bubble); color: #fff; border-bottom-right-radius: 4px; }
  .bot  { align-self: flex-start; background: var(--bot-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .bot.error { border-color: #c0392b; color: #c0392b; }
  .meta {
    align-self: flex-start; max-width: 85%; width: 85%;
    border: 1px solid var(--border); border-radius: 12px;
    background: var(--panel); font-size: 13px;
  }
  .meta summary {
    cursor: pointer; padding: 8px 14px; color: var(--muted);
    user-select: none; list-style: none;
  }
  .meta summary::before { content: "▸ "; }
  .meta[open] summary::before { content: "▾ "; }
  .meta .body { padding: 4px 14px 12px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    padding: 3px 10px; border-radius: 999px; font-size: 12px;
    border: 1px solid transparent; cursor: default;
  }
  .chip small { opacity: .65; margin-left: 5px; }
  .Material  { background: #e3f0e9; border-color: #b7d4c4; color: #1e5c40; }
  .Process   { background: #e5ecf7; border-color: #bccde8; color: #274d80; }
  .Equipment { background: #f7ecd9; border-color: #e6d0a3; color: #7a5716; }
  .Property  { background: #f2e5f1; border-color: #dcc0da; color: #6d2f68; }
  .Experiment{ background: #e0f2f4; border-color: #b3dde1; color: #175f66; }
  .Expert    { background: #fbe6e0; border-color: #f0c4b6; color: #8c3417; }
  .Facility  { background: #eceff1; border-color: #cfd8dc; color: #37474f; }
  .src { padding: 6px 0; border-top: 1px dashed var(--border); }
  .src:first-child { border-top: none; }
  .src b { font-weight: 600; }
  .src .tags { color: var(--muted); }
  .src .sum { color: var(--muted); margin-top: 2px; }
  form {
    display: flex; gap: 10px; padding: 16px 22px 20px;
    background: var(--panel); border-top: 1px solid var(--border);
  }
  form .inner { display: flex; gap: 10px; max-width: 900px; width: 100%; margin: 0 auto; }
  input {
    flex: 1; padding: 11px 15px; border: 1px solid var(--border);
    border-radius: 10px; font: inherit; background: var(--bg); color: var(--text);
  }
  input:focus { outline: 2px solid var(--accent); border-color: transparent; }
  button {
    padding: 11px 22px; border: 0; border-radius: 10px;
    background: var(--accent); color: #fff; font: inherit; cursor: pointer;
  }
  button:disabled { opacity: .5; cursor: wait; }
  .typing { color: var(--muted); font-style: italic; }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #191813; --panel: #211f19; --border: #37342b;
      --text: #e8e6df; --muted: #97928a; --accent: #3d9a80;
      --bot-bubble: #211f19;
    }
    .Material  { background: #1e3a2c; border-color: #2f5c45; color: #a4d4bb; }
    .Process   { background: #1e2c44; border-color: #33507e; color: #a9c4ea; }
    .Equipment { background: #3e341c; border-color: #6b5a2e; color: #e2c98a; }
    .Property  { background: #3a2438; border-color: #644260; color: #dcb3d8; }
    .Experiment{ background: #163a3e; border-color: #2e6167; color: #a4d7dd; }
    .Expert    { background: #42231a; border-color: #74422f; color: #eab8a4; }
    .Facility  { background: #2a2e31; border-color: #4a5256; color: #c3cdd2; }
  }
</style>
</head>
<body>
<header>
  <h1>Граф знаний · металлургия</h1>
  <span id="status">…</span>
</header>

<div id="chat"></div>

<form id="form">
  <div class="inner">
    <input id="input" placeholder="Например: при каких условиях выделяют элементарную серу?" autocomplete="off" autofocus>
    <button id="send" type="submit">Спросить</button>
  </div>
</form>

<script>
const chat = document.getElementById("chat");
const form = document.getElementById("form");
const input = document.getElementById("input");
const send = document.getElementById("send");

fetch("/api/health").then(r => r.json())
  .then(d => document.getElementById("status").textContent = `вершин в графе: ${d.nodes_in_graph}`)
  .catch(() => document.getElementById("status").textContent = "бэкенд недоступен");

function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text != null) e.textContent = text;
  return e;
}

function renderMeta(data) {
  // использованные вершины
  if (data.used_nodes?.length) {
    const d = el("details", "meta");
    d.appendChild(el("summary", null, `Использованные вершины (${data.used_nodes.length})`));
    const body = el("div", "body");
    const chips = el("div", "chips");
    for (const n of data.used_nodes) {
      const chip = el("span", `chip ${n.label}`);
      chip.textContent = n.name;
      chip.title = (n.text || n.name) + `\nscore: ${n.score}`;
      const s = el("small", null, n.label);
      chip.appendChild(s);
      chips.appendChild(chip);
    }
    body.appendChild(chips);
    d.appendChild(body);
    chat.appendChild(d);
  }
  // источники
  if (data.sources?.length) {
    const d = el("details", "meta");
    d.open = true;
    d.appendChild(el("summary", null, `Источники (${data.sources.length})`));
    const body = el("div", "body");
    for (const s of data.sources) {
      const row = el("div", "src");
      row.appendChild(el("b", null, s.title || s.uid));
      const tags = [s.source_type, s.year, s.country].filter(Boolean).join(" · ");
      if (tags) row.appendChild(el("span", "tags", "  " + tags));
      row.appendChild(el("span", "tags", `  (вершин: ${s.used_nodes_count})`));
      if (s.summary) row.appendChild(el("div", "sum", s.summary));
      body.appendChild(row);
    }
    d.appendChild(body);
    chat.appendChild(d);
  }
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const query = input.value.trim();
  if (!query) return;
  input.value = "";
  send.disabled = true;

  chat.appendChild(el("div", "msg user", query));
  const typing = el("div", "msg bot typing", "думаю: сущности → поиск вершин → скоринг → ответ…");
  chat.appendChild(typing);
  chat.scrollTop = chat.scrollHeight;

  try {
    const resp = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query }),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    typing.remove();
    chat.appendChild(el("div", "msg bot", data.answer));
    renderMeta(data);
  } catch (err) {
    typing.remove();
    chat.appendChild(el("div", "msg bot error", "Ошибка запроса: " + err.message));
  } finally {
    send.disabled = false;
    chat.scrollTop = chat.scrollHeight;
    input.focus();
  }
});
</script>
</body>
</html>
