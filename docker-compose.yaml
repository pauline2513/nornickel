services:
  neo4j:
    image: neo4j:5
    container_name: nornickel-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/neo4jpass
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1g
    ports:
      - "7475:7474"
      - "7688:7687"
    volumes:
      - nornickel_neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30

  backend:
    build: .
    container_name: nornickel-backend
    restart: unless-stopped
    env_file: .env
    environment:
      NEO4J_URI: bolt://neo4j:7687   # внутри docker-сети, поверх значения из .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data             # pred.json и .txt для ingest/суммаризации
      - nornickel_hf_cache:/root/.cache/huggingface  # веса bge-m3 (скачиваются один раз)
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  nornickel_neo4jdata:
    name: rag_nornickel_neo4jdata
  nornickel_hf_cache:
    name: rag_nornickel_hf_cache
